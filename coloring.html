<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 קסם הצבעים</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Rubik',sans-serif;
    background:#0f0f0f;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  h1 {
    font-size:28px;
    font-weight:900;
    padding:20px;
    background:linear-gradient(135deg,#f7971e,#ffd200);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-align:center;
  }

  .main {
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width:500px;
    padding:0 16px;
    gap:16px;
  }

  .figure-wrap {
    width:200px;
    height:320px;
  }
  .figure-wrap svg { width:100%; height:100%; }

  .zone { cursor:pointer; transition:filter 0.2s; }
  .zone:hover { filter:brightness(1.3); }

  .color-section { width:100%; }

  .zone-label {
    font-size:14px;
    color:#aaa;
    margin-bottom:8px;
    text-align:center;
  }
  .zone-label span { color:#ffd200; font-weight:700; }

  .colors {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    margin-bottom:12px;
  }

  .color-dot {
    width:36px; height:36px;
    border-radius:50%;
    border:3px solid transparent;
    cursor:pointer;
    transition:transform 0.15s, border-color 0.15s;
  }
  .color-dot:hover { transform:scale(1.15); }
  .color-dot.selected { border-color:#fff; transform:scale(1.2); }

  .zone-btns {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .zone-btn {
    padding:8px 14px;
    border-radius:16px;
    border:2px solid #333;
    background:#1a1a1a;
    color:#aaa;
    font-family:'Rubik',sans-serif;
    font-size:13px;
    cursor:pointer;
    transition:all 0.2s;
  }
  .zone-btn.selected { border-color:#ffd200; color:#ffd200; background:#2a2200; }
  .zone-btn.done { border-color:#4CAF50; color:#4CAF50; background:#0a2000; }

  .send-btn {
    width:100%;
    padding:16px;
    background:linear-gradient(135deg,#f7971e,#ffd200);
    color:#000;
    font-family:'Rubik',sans-serif;
    font-weight:900;
    font-size:18px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    margin-bottom:24px;
  }
  .send-btn:disabled { opacity:0.4; cursor:not-allowed; }

  .sent-msg {
    display:none;
    text-align:center;
    padding:16px;
    background:#0a2000;
    border:2px solid #4CAF50;
    border-radius:16px;
    color:#4CAF50;
    font-weight:700;
    font-size:16px;
    margin-bottom:24px;
    width:100%;
  }
</style>
</head>
<body>

<h1>🎨 קסם הצבעים</h1>

<div class="main">
  <div class="figure-wrap">
    <svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="45" rx="32" ry="38" fill="#f5c5a3" stroke="#333" stroke-width="1.5"/>
      <ellipse cx="100" cy="20" rx="32" ry="18" fill="#555"/>
      <circle cx="88" cy="40" r="4" fill="#222"/>
      <circle cx="112" cy="40" r="4" fill="#222"/>
      <circle cx="89" cy="39" r="1.5" fill="#fff"/>
      <circle cx="113" cy="39" r="1.5" fill="#fff"/>
      <ellipse cx="100" cy="52" rx="4" ry="3" fill="#e8a882"/>
      <path d="M88 62 Q100 70 112 62" stroke="#c0704a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <rect x="88" y="80" width="24" height="18" fill="#f5c5a3"/>
      <path id="jacket" d="M50 98 L70 95 L100 105 L130 95 L150 98 L158 200 L42 200 Z" fill="#1a1a2e" stroke="#333" stroke-width="1.5" class="zone" onclick="selectZone('jacket')"/>
      <path id="shirt" d="M72 97 L100 107 L128 97 L132 200 L68 200 Z" fill="#4a90d9" stroke="#333" stroke-width="1.5" class="zone" onclick="selectZone('shirt')"/>
      <path id="tie" d="M96 100 L104 100 L108 160 L100 170 L92 160 Z" fill="#e74c3c" stroke="#333" stroke-width="1.5" class="zone" onclick="selectZone('tie')"/>
      <path id="pants" d="M60 198 L140 198 L145 290 L108 290 L100 250 L92 290 L55 290 Z" fill="#2c3e50" stroke="#333" stroke-width="1.5" class="zone" onclick="selectZone('pants')"/>
      <ellipse id="shoe-left" cx="68" cy="296" rx="18" ry="10" fill="#1a1a1a" stroke="#333" stroke-width="1.5" class="zone" onclick="selectZone('shoes')"/>
      <ellipse id="shoe-right" cx="132" cy="296" rx="18" ry="10" fill="#1a1a1a" stroke="#333" stroke-width="1.5" class="zone" onclick="selectZone('shoes')"/>
      <path d="M52 100 L30 170 L44 174 L62 110 Z" fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>
      <path d="M148 100 L170 170 L156 174 L138 110 Z" fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>
      <ellipse cx="37" cy="176" rx="10" ry="8" fill="#f5c5a3"/>
      <ellipse cx="163" cy="176" rx="10" ry="8" fill="#f5c5a3"/>
    </svg>
  </div>

  <div class="zone-btns">
    <button class="zone-btn" id="zbtn-jacket" onclick="selectZone('jacket')">ג׳קט</button>
    <button class="zone-btn" id="zbtn-shirt" onclick="selectZone('shirt')">חולצה</button>
    <button class="zone-btn" id="zbtn-tie" onclick="selectZone('tie')">עניבה</button>
    <button class="zone-btn" id="zbtn-pants" onclick="selectZone('pants')">מכנס</button>
    <button class="zone-btn" id="zbtn-shoes" onclick="selectZone('shoes')">נעלים</button>
  </div>

  <div class="color-section">
    <div class="zone-label">בחר אזור ואז צבע — <span id="activeZoneLabel">לחץ על אזור</span></div>
    <div class="colors" id="colorPicker"></div>
  </div>

  <button class="send-btn" id="sendBtn" onclick="sendColors()" disabled>שלח לקוסם 🎩</button>
  <div class="sent-msg" id="sentMsg">✅ נשלח! הקוסם יודע הכל...</div>
</div>

<script>
  const COLORS = [
    {name:'אדום',hex:'#e74c3c'},{name:'כחול',hex:'#3498db'},{name:'ירוק',hex:'#2ecc71'},
    {name:'צהוב',hex:'#f1c40f'},{name:'כתום',hex:'#e67e22'},{name:'סגול',hex:'#9b59b6'},
    {name:'ורוד',hex:'#e91e8c'},{name:'לבן',hex:'#ecf0f1'},{name:'שחור',hex:'#2a2a2a'},{name:'חום',hex:'#8B4513'},
  ];
  const ZONES = {
    jacket:{elements:['jacket']},shirt:{elements:['shirt']},
    tie:{elements:['tie']},pants:{elements:['pants']},shoes:{elements:['shoe-left','shoe-right']},
  };

  let selectedZone=null, chosen={};

  const picker = document.getElementById('colorPicker');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className='color-dot'; d.style.background=c.hex; d.title=c.name;
    d.onclick = () => pickColor(c,d);
    picker.appendChild(d);
  });

  function selectZone(zone) {
    selectedZone=zone;
    document.querySelectorAll('.zone-btn').forEach(b => {
      b.classList.remove('selected');
    });
    document.getElementById('zbtn-'+zone).classList.add('selected');
    document.getElementById('activeZoneLabel').textContent =
      {jacket:"ג'קט",shirt:'חולצה',tie:'עניבה',pants:'מכנס',shoes:'נעלים'}[zone];
    document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
  }

  function pickColor(color,dot) {
    if(!selectedZone){ document.getElementById('activeZoneLabel').textContent='← קודם בחר אזור!'; return; }
    document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
    dot.classList.add('selected');
    ZONES[selectedZone].elements.forEach(id=>document.getElementById(id).setAttribute('fill',color.hex));
    chosen[selectedZone]=color;
    const btn=document.getElementById('zbtn-'+selectedZone);
    btn.classList.remove('selected'); btn.classList.add('done');
    btn.style.borderColor=color.hex; btn.style.color=color.hex;
    document.getElementById('sendBtn').disabled = Object.keys(chosen).length < 5;
  }

  function sendColors() {
    const payload = {
      colors:{
        jacket:chosen.jacket?.name||'?', shirt:chosen.shirt?.name||'?',
        tie:chosen.tie?.name||'?', pants:chosen.pants?.name||'?', shoes:chosen.shoes?.name||'?',
      }, ts:Date.now()
    };
    firebase.database().ref('magic/coloring').set(payload)
      .then(()=>{ document.getElementById('sendBtn').style.display='none'; document.getElementById('sentMsg').style.display='block'; })
      .catch(e=>alert('שגיאה: '+e.message));
  }
</script>

</body>
</html>
