document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const word = sel.toString().trim();
  if (word.length < 2) return;
  
  // שלח לFirebase
  db.ref('magic/peek').set({ word, ts: Date.now() });
  
  // הצג toast
  const toast = document.getElementById('toast');
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 1500);
});

  ],
  links:['היסטוריה','מדע','תרבות','טבע','חברה','כלכלה','פוליטיקה','אמנות']

function getArticle(title) {
  return ARTICLES[title] || {
    ...GENERIC_ARTICLE,
    intro: GENERIC_ARTICLE.intro.replace(/{title}/g, title),
    sections: GENERIC_ARTICLE.sections.map(s => ({
      ...s,
      text: s.text.replace(/{title}/g, title)
    }))
  };
}

function goHome() {
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('articleArea').style.display = 'none';
  document.getElementById('searchInput').value = '';
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  showResults(q);
}

function showResults(q) {
  document.getElementById('articleArea').style.display = 'none';
  document.getElementById('searchResults').style.display = 'block';
  document.getElementById('srTitle').textContent = 'תוצאות חיפוש עבור "' + q + '"';

  const related = Object.keys(ARTICLES).filter(k => k !== q).slice(0,3);
  
  document.getElementById('srItems').innerHTML = `
    <div class="result-item">
      <h3><a onclick="openArticle('${q}')">${q}</a></h3>
      <p>${q} — ערך מלא עם מידע מקיף על הנושא. לחץ לקריאה.</p>
    </div>
    ${related.map(r => `
    <div class="result-item">
      <h3><a onclick="openArticle('${r}')">${r}</a></h3>
      <p>${r} — ראו גם ערך זה הקשור לנושא.</p>
    </div>`).join('')}
  `;
}

function openArticle(title) {
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('articleArea').style.display = 'flex';
  document.getElementById('artTitle').textContent = title;
  document.getElementById('searchInput').value = title;

  const art = getArticle(title);
  const links = art.links || ['מדע','טבע','חיים','עולם','היסטוריה'];

  let html = `
    <div class="infobox">
      <div class="infobox-title">${title}</div>
      <div class="infobox-img"></div>
      <div class="infobox-row"><span>סוג</span><span>${art.cat}</span></div>
      <div class="infobox-row"><span>תחום</span><span>${art.sub}</span></div>
    </div>
    <p>${art.intro}</p>
  `;

  art.sections.forEach(s => {
    html += `<h2>${s.title}</h2><p>${s.text}</p>`;
  });

  html += `<h2>ראו גם</h2><p>`;
  links.forEach((l,i) => {
    html += `<a onclick="openArticle('${l}')">${l}</a>`;
    if (i < links.length-1) html += ' · ';
  });
  html += `</p>`;

  html += `<div style="margin-top:20px;padding-top:8px;border-top:1px solid #a2a9b1;font-size:12px;color:#54595d;">
    דף זה שוכלל לאחרונה ב-${new Date().toLocaleDateString('he-IL')} · 
    <a href="#" onclick="return false;">תרמו לוויקיפדיה</a>
  </div>`;

  document.getElementById('artBody').innerHTML = html;
  window.scrollTo(0,0);
}
</script>
</body>
</html>
