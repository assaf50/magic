<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ויקיפדיה - האנציקלופדיה החופשית</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Linux Libertine','Georgia','Times',serif; font-size:14px; color:#202122; background:#fff; direction:rtl; -webkit-user-select:text; user-select:text; }

.wiki-top { display:flex; justify-content:space-between; padding:4px 12px; background:#f8f9fa; border-bottom:1px solid #eaecf0; font-size:12px; }
.wiki-top a { color:#0645ad; text-decoration:none; }
.wiki-logo-bar { display:flex; align-items:center; padding:8px 12px; gap:12px; border-bottom:1px solid #eaecf0; }
.wiki-logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
.wiki-logo-text { font-family:'Linux Libertine',Georgia,serif; font-size:20px; color:#000; }
.wiki-logo-sub { font-size:11px; color:#54595d; }
.search-bar { display:flex; flex:1; max-width:400px; margin-right:auto; }
.search-input { flex:1; padding:6px 10px; border:1px solid #a2a9b1; border-radius:2px 0 0 2px; font-size:13px; outline:none; font-family:inherit; }
.search-btn { padding:6px 12px; background:#f8f9fa; border:1px solid #a2a9b1; border-right:none; border-radius:0 2px 2px 0; cursor:pointer; font-size:15px; }
.wiki-tabs { display:flex; border-bottom:1px solid #a2a9b1; padding:0 12px; background:#f8f9fa; font-size:13px; }
.wiki-tab { padding:6px 14px; color:#0645ad; border:1px solid transparent; border-bottom:none; margin-bottom:-1px; cursor:pointer; }
.wiki-tab.active { background:#fff; border-color:#a2a9b1; color:#202122; }

.wiki-content { max-width:960px; margin:0 auto; padding:12px 16px; display:flex; gap:20px; }
.wiki-main { flex:1; min-width:0; }
.article-title { font-family:'Linux Libertine',Georgia,serif; font-size:28px; font-weight:normal; border-bottom:1px solid #a2a9b1; padding-bottom:4px; margin-bottom:12px; }
.article-text { line-height:1.8; }
.article-text p { margin-bottom:10px; font-size:14px; }
.article-text a { color:#0645ad; text-decoration:none; cursor:pointer; }
.article-text a:hover { text-decoration:underline; }
.article-text h2 { font-family:'Linux Libertine',Georgia,serif; font-size:20px; font-weight:normal; border-bottom:1px solid #a2a9b1; padding-bottom:3px; margin:16px 0 8px; }
.article-text h3 { font-size:16px; margin:12px 0 6px; }

.search-results { display:none; padding:12px 16px; max-width:960px; margin:0 auto; }
.search-results h2 { font-size:22px; font-weight:normal; font-family:'Linux Libertine',Georgia,serif; margin-bottom:12px; border-bottom:1px solid #a2a9b1; padding-bottom:6px; }
.result-item { margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid #eaecf0; }
.result-item h3 a { color:#0645ad; font-size:17px; text-decoration:none; cursor:pointer; }
.result-item h3 a:hover { text-decoration:underline; }
.result-item p { font-size:13px; color:#54595d; margin-top:4px; line-height:1.5; }

.wiki-sidebar { width:180px; flex-shrink:0; font-size:12px; }
.sidebar-box { border:1px solid #a2a9b1; margin-bottom:12px; }
.sidebar-title { background:#cee0f2; padding:4px 8px; font-weight:bold; font-size:12px; }
.sidebar-links { padding:6px 8px; }
.sidebar-links a { display:block; color:#0645ad; text-decoration:none; padding:2px 0; }

.loading { text-align:center; padding:40px; color:#54595d; font-size:16px; }

.wiki-content img { max-width:100%; height:auto; }
.thumb { float:left; margin:0 0 10px 16px; border:1px solid #a2a9b1; background:#f8f9fa; padding:4px; font-size:11px; text-align:center; }
.thumb img { display:block; max-width:200px; }
.thumbcaption { margin-top:4px; color:#54595d; }

.selection-toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,100,0,0.85); color:#fff; padding:10px 24px; border-radius:20px; font-size:14px; font-family:sans-serif; display:none; z-index:999; }

@media(max-width:600px) { .wiki-sidebar{display:none} .article-title{font-size:20px} }
</style>
</head>
<body>

<div class="wiki-top">
  <div style="display:flex;gap:10px"><a href="#">צור חשבון</a> · <a href="#">כניסה לחשבון</a></div>
  <div><a href="#">תרומות</a> · <a href="#">דף שיחה</a></div>
</div>

<div class="wiki-logo-bar">
  <a class="wiki-logo" href="#" onclick="goHome();return false;">
    <svg width="50" height="50" viewBox="0 0 50 50">
      <circle cx="25" cy="25" r="23" fill="none" stroke="#a2a9b1" stroke-width="1.5"/>
      <text x="25" y="22" text-anchor="middle" font-size="14" fill="#202122" font-family="Georgia,serif">W</text>
      <text x="25" y="33" text-anchor="middle" font-size="7" fill="#54595d" font-family="sans-serif">IKIPEDIA</text>
    </svg>
    <div><div class="wiki-logo-text">ויקיפדיה</div><div class="wiki-logo-sub">האנציקלופדיה החופשית</div></div>
  </a>
  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="חיפוש בוויקיפדיה" onkeydown="if(event.key==='Enter')doSearch()"/>
    <button class="search-btn" onclick="doSearch()">🔍</button>
  </div>
</div>

<div class="wiki-tabs">
  <span class="wiki-tab active">ערך</span>
  <span class="wiki-tab">שיחה</span>
  <span class="wiki-tab">קריאה</span>
  <span class="wiki-tab">עריכה</span>
  <span class="wiki-tab">היסטוריה</span>
</div>

<div class="search-results" id="searchResults">
  <h2 id="srTitle"></h2>
  <div id="srItems"></div>
</div>

<div class="wiki-content" id="articleArea" style="display:none">
  <div class="wiki-main">
    <h1 class="article-title" id="artTitle"></h1>
    <div class="article-text" id="artBody"></div>
  </div>
  <div class="wiki-sidebar">
    <div class="sidebar-box">
      <div class="sidebar-title">כלים</div>
      <div class="sidebar-links">
        <a href="#">דפים המקשרים לכאן</a>
        <a href="#">שינויים קשורים</a>
        <a href="#">דפים מיוחדים</a>
        <a href="#">קישור קבוע</a>
        <a href="#">מידע על הדף</a>
      </div>
    </div>
    <div class="sidebar-box">
      <div class="sidebar-title">הדפסה</div>
      <div class="sidebar-links">
        <a href="#">גרסה להדפסה</a>
        <a href="#">הורדה כ-PDF</a>
      </div>
    </div>
  </div>
</div>

<div class="selection-toast" id="toast">✅ המילה נשלחה!</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyARe0oAWcfEKXBaakw0_ZRJ1fo5-Y49Yag",
  authDomain:"assafma-f409e.firebaseapp.com",
  databaseURL:"https://assafma-f409e-default-rtdb.firebaseio.com",
  projectId:"assafma-f409e",
  storageBucket:"assafma-f409e.firebasestorage.app",
  messagingSenderId:"665696235616",
  appId:"1:665696235616:web:06fff6145f50c10dcfd305"
});
const db = firebase.database();

// שלח מילה מסומנת לקוסם
document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const word = sel.toString().trim().split(/\s+/)[0]; // מילה ראשונה בלבד
  if (word.length < 2) return;
  db.ref('magic/peek').set({ word, ts: Date.now() });
  const t = document.getElementById('toast');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 1500);
});

function goHome() {
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('articleArea').style.display = 'none';
  document.getElementById('searchInput').value = '';
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  document.getElementById('articleArea').style.display = 'none';
  document.getElementById('searchResults').style.display = 'block';
  document.getElementById('srTitle').textContent = 'מחפש "' + q + '"...';
  document.getElementById('srItems').innerHTML = '<div class="loading">⏳ טוען תוצאות...</div>';

  try {
    // חיפוש בויקיפדיה עברית
    const searchUrl = `https://he.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&srlimit=5&format=json&origin=*`;
    const res = await fetch(searchUrl);
    const data = await res.json();
    const results = data.query.search;

    document.getElementById('srTitle').textContent = 'תוצאות חיפוש עבור "' + q + '"';

    if (results.length === 0) {
      document.getElementById('srItems').innerHTML = '<p>לא נמצאו תוצאות.</p>';
      return;
    }

    document.getElementById('srItems').innerHTML = results.map(r => `
      <div class="result-item">
        <h3><a onclick="openArticle('${r.title.replace(/'/g,"\\'")}')">
          ${r.title}
        </a></h3>
        <p>${r.snippet.replace(/<[^>]+>/g,'').substring(0,200)}...</p>
      </div>
    `).join('');

  } catch(e) {
    document.getElementById('srItems').innerHTML = '<p>שגיאה בטעינה. נסה שוב.</p>';
  }
}

async function openArticle(title) {
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('articleArea').style.display = 'flex';
  document.getElementById('artTitle').textContent = title;
  document.getElementById('searchInput').value = title;
  document.getElementById('artBody').innerHTML = '<div class="loading">⏳ טוען ערך...</div>';
  window.scrollTo(0,0);

  try {
    // שליפת תוכן הערך מויקיפדיה עברית
    const url = `https://he.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&prop=text&format=json&origin=*`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.error) {
      document.getElementById('artBody').innerHTML = '<p>הערך לא נמצא.</p>';
      return;
    }

    let html = data.parse.text['*'];

    // ניקוי קישורים חיצוניים + החלפת קישורים פנימיים
    html = html.replace(/href="\/wiki\/([^"]+)"/g, (m, page) => {
      const decoded = decodeURIComponent(page).replace(/_/g,' ');
      return `href="#" onclick="openArticle('${decoded.replace(/'/g,"\\'")}');return false;"`;
    });

    // הסר תבניות מיותרות
    html = html.replace(/<div class="mw-parser-output">/g,'');
    html = html.replace(/class="mw-editsection[^"]*"[^>]*>.*?<\/span>/gs,'');

    document.getElementById('artBody').innerHTML = html;

    // תקן תמונות
    document.querySelectorAll('#artBody img').forEach(img => {
      if (img.src.startsWith('//')) img.src = 'https:' + img.src;
      if (!img.src.startsWith('http')) img.removeAttribute('src');
    });

  } catch(e) {
    document.getElementById('artBody').innerHTML = '<p>שגיאה בטעינה.</p>';
  }
}
</script>
</body>
</html>
