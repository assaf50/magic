<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculator</title>
 <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="מחשבון">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

  html, body {
    width:100%; height:100%;
    background:#000;
    font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
    overflow:hidden;
  }

  .ios-shell {
    width:100%;
    max-width:430px;
    height:100vh;
    margin:0 auto;
    background:#000;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* STATUS BAR */
  .status-bar {
    display:none;
    justify-content:space-between;
    align-items:center;
    padding:14px 24px 0;
    height:50px;
    flex-shrink:0;
  }
 @media (display-mode: standalone) {
  .status-bar { display: none; }
}

  .status-time {
    font-size:17px;
    font-weight:600;
    color:#fff;
    letter-spacing:-0.3px;
  }

  .status-icons {
    display:flex;
    align-items:center;
    gap:7px;
  }

  .status-icons svg {
    fill:#fff;
  }

  /* TOP BAR with calculator icon and history */
  .top-bar {
    display:none;
    justify-content:space-between;
    align-items:center;
    padding:8px 20px 4px;
    flex-shrink:0;
  }

  .top-icon {
    width:36px; height:36px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
  }

  /* DISPLAY */
  .display {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:0 24px 12px;
    min-height:0;
  }

  .history {
    font-size:22px;
    color:rgba(255,255,255,0.4);
    text-align:right;
    min-height:30px;
    margin-bottom:2px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .main-display {
    font-size:88px;
    font-weight:200;
    color:#fff;
    text-align:right;
    letter-spacing:-3px;
    line-height:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    transition:font-size 0.1s;
  }
  .main-display.size6 { font-size:72px; }
  .main-display.size7 { font-size:60px; }
  .main-display.size9 { font-size:48px; }
  .main-display.size12 { font-size:36px; }

  /* BUTTONS */
  .buttons {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:13px;
    padding:13px 13px 34px;
    flex-shrink:0;
  }

  .btn {
    border-radius:50%;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
    -webkit-font-smoothing:antialiased;
    transition:filter 0.05s;
    aspect-ratio:1;
    font-size:34px;
    font-weight:400;
  }

  .btn:active { filter:brightness(1.4); transform:scale(0.94); }

  .btn-func {
    background:#a5a5a5;
    color:#1c1c1e;
    font-size:22px;
    font-weight:500;
  }

  .btn-op {
    background:#ff9f0a;
    color:#fff;
    font-size:42px;
    font-weight:300;
  }

  .btn-op.active {
    background:#fff;
    color:#ff9f0a;
  }

  .btn-num {
    background:#333333;
    color:#fff;
    font-size:34px;
  }

  .btn-zero {
    grid-column:span 2;
    border-radius:50px;
    aspect-ratio:unset;
    justify-content:flex-start;
    padding-left:30px;
    font-size:34px;
  }

  /* make buttons square-ish based on grid */
  @media (max-height: 700px) {
    .main-display { font-size:70px; }
    .buttons { gap:10px; padding:10px 10px 20px; }
    .btn { font-size:28px; }
    .btn-op { font-size:34px; }
  }
</style>
</head>
<body>
<div class="ios-shell">

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-time" id="clockTime">16:33</div>
    <div class="status-icons">
      <!-- Signal -->
      <svg width="18" height="12" viewBox="0 0 18 12">
        <rect x="0" y="7" width="3" height="5" rx="0.8" opacity="0.4"/>
        <rect x="4.5" y="5" width="3" height="7" rx="0.8" opacity="0.6"/>
        <rect x="9" y="3" width="3" height="9" rx="0.8" opacity="0.8"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.8"/>
      </svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 16 12">
        <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
        <path d="M8 6.5C6.1 6.5 4.4 7.3 3.2 8.5L4.6 10c.9-.9 2.1-1.5 3.4-1.5s2.5.6 3.4 1.5l1.4-1.5C11.6 7.3 9.9 6.5 8 6.5z" opacity="0.75"/>
        <path d="M8 3.5C5.1 3.5 2.5 4.7.7 6.7L2.1 8.1C3.6 6.4 5.7 5.5 8 5.5s4.4.9 5.9 2.6l1.4-1.4C13.5 4.7 10.9 3.5 8 3.5z" opacity="0.5"/>
      </svg>
      <!-- Battery -->
      <svg width="27" height="13" viewBox="0 0 27 13">
        <rect x="0" y="1" width="23" height="11" rx="3.5" stroke="#fff" stroke-width="1.2" fill="none"/>
        <rect x="1.5" y="2.5" width="10" height="8" rx="2" fill="#fff"/>
        <path d="M24.5 4.5v4a2 2 0 0 0 0-4z" fill="#fff" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-icon">⌗</div>
    <div class="top-icon">🕐</div>
  </div>

  <!-- Display -->
  <div class="display">
    <div class="history" id="history"></div>
    <div class="main-display" id="display">0</div>
  </div>

  <!-- Buttons -->
  <div class="buttons">
    <button class="btn btn-func" onclick="pressAC()"><span id="acLabel">AC</span></button>
    <button class="btn btn-func" onclick="pressSign()">+/−</button>
    <button class="btn btn-func" onclick="pressPercent()">%</button>
    <button class="btn btn-op" id="op-div" onclick="pressOp('÷')">÷</button>

    <button class="btn btn-num" onclick="pressNum('7')">7</button>
    <button class="btn btn-num" onclick="pressNum('8')">8</button>
    <button class="btn btn-num" onclick="pressNum('9')">9</button>
    <button class="btn btn-op" id="op-mul" onclick="pressOp('×')">×</button>

    <button class="btn btn-num" onclick="pressNum('4')">4</button>
    <button class="btn btn-num" onclick="pressNum('5')">5</button>
    <button class="btn btn-num" onclick="pressNum('6')">6</button>
    <button class="btn btn-op" id="op-sub" onclick="pressOp('−')">−</button>

    <button class="btn btn-num" onclick="pressNum('1')">1</button>
    <button class="btn btn-num" onclick="pressNum('2')">2</button>
    <button class="btn btn-num" onclick="pressNum('3')">3</button>
    <button class="btn btn-op" id="op-add" onclick="pressOp('+')">+</button>

    <button class="btn btn-num btn-zero" onclick="pressNum('0')">0</button>
    <button class="btn btn-num" onclick="pressDot()">.</button>
    <button class="btn btn-op" onclick="pressEquals()">=</button>
  </div>
</div>

<script>
  // Live clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clockTime').textContent = h+':'+m;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // Calculator
  let current='0', stored=null, op=null, justCalc=false, _magicUsed=false;
  const disp = document.getElementById('display');
  const hist = document.getElementById('history');

  function updateDisplay(val) {
    let str = String(val);
    disp.className = 'main-display';
    if (str.length > 12) disp.classList.add('size12');
    else if (str.length > 9) disp.classList.add('size9');
    else if (str.length > 7) disp.classList.add('size7');
    else if (str.length > 6) disp.classList.add('size6');
    disp.textContent = str;
    document.getElementById('acLabel').textContent = (current==='0' && stored===null) ? 'AC' : 'C';
  }

  function fmt(n) {
    if (isNaN(n)||!isFinite(n)) return 'Error';
    return parseFloat(n.toPrecision(10)).toString();
  }

  function pressNum(n) {
    clearOp();
    if (justCalc) { current=n; justCalc=false; }
    else current = current==='0' ? n : current+n;
    if (current.length>12) current=current.slice(0,12);
    updateDisplay(current);
  }

  function pressDot() {
    clearOp();
    if (justCalc) { current='0.'; justCalc=false; }
    else if (!current.includes('.')) current+='.';
    updateDisplay(current);
  }

  function pressAC() {
    current='0'; stored=null; op=null; justCalc=false; _magicUsed=false;
    hist.textContent=''; clearOp(); updateDisplay('0');
  }

  function pressSign() { current=String(parseFloat(current)*-1); updateDisplay(current); }
  function pressPercent() { current=String(parseFloat(current)/100); updateDisplay(current); }

  function pressOp(o) {
    clearOp();
    if (stored!==null && op && !justCalc) {
      const r=calc(parseFloat(stored),parseFloat(current),op);
      stored=String(r); current=String(r);
      hist.textContent=fmt(r)+' '+o;
    } else {
      stored=current; hist.textContent=current+' '+o;
    }
    op=o; justCalc=true;
    document.getElementById('op-'+{'+':'add','−':'sub','×':'mul','÷':'div'}[o])?.classList.add('active');
    updateDisplay(current);
  }

  function pressEquals() {
    if (!op||stored===null) return;
    let a=parseFloat(stored), b=parseFloat(current);
    if (window._magicReady && window._magicNumber!==undefined && !_magicUsed) {
      b=window._magicNumber; _magicUsed=true;
    }
    const result=calc(a,b,op);
    hist.textContent=fmt(a)+' '+op+' '+fmt(b)+' =';
    current=fmt(result); stored=null; op=null; justCalc=true;
    clearOp(); updateDisplay(current);
  }

  function calc(a,b,o) {
    switch(o) {
      case '+': return a+b;
      case '−': return a-b;
      case '×': return a*b;
      case '÷': return b!==0?a/b:'Error';
      default: return b;
    }
  }

  function clearOp() { document.querySelectorAll('.btn-op').forEach(b=>b.classList.remove('active')); }
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  firebase.initializeApp({
    apiKey: "AIzaSyARe0oAWcfEKXBaakw0_ZRJ1fo5-Y49Yag",
    authDomain: "assafma-f409e.firebaseapp.com",
    databaseURL: "https://assafma-f409e-default-rtdb.firebaseio.com",
    projectId: "assafma-f409e",
    storageBucket: "assafma-f409e.firebasestorage.app",
    messagingSenderId: "665696235616",
    appId: "1:665696235616:web:06fff6145f50c10dcfd305"
  });

  firebase.database().ref('magic/kikoNumber').on('value', (snap) => {
    const data = snap.val();
    if (data && data.value !== undefined) {
      window._magicNumber = data.value;
      window._magicReady = true;
      current = String(data.value);
      stored = null; op = null; justCalc = false; _magicUsed = false;
      updateDisplay(current);
    }
  });
</script>
</body>
</html>
