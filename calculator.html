<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculator</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyARe0oAWcfEKXBaakw0_ZRJ1fo5-Y49Yag",
    authDomain: "assafma-f409e.firebaseapp.com",
    databaseURL: "https://assafma-f409e-default-rtdb.firebaseio.com",
    projectId: "assafma-f409e",
    storageBucket: "assafma-f409e.firebasestorage.app",
    messagingSenderId: "665696235616",
    appId: "1:665696235616:web:06fff6145f50c10dcfd305"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  db.ref('magic/myNumber').on('value', (snap) => {
    const data = snap.val();
    if (data && data.value !== undefined) {
      window._magicNumber = data.value;
      window._magicReady = true;
      console.log('Magic number received:', data.value);
      setTimeout(() => {
        current = String(data.value);
        stored = null; op = null; justCalc = false; _magicUsed = false;
        const d = document.getElementById('display');
        if (d) {
          d.textContent = current;
          d.className = 'main-display';
          if (current.length > 9) d.classList.add('small');
          if (current.length > 7) d.classList.add('medium');
        }
        document.getElementById('acLabel').textContent = 'C';
      }, 500);
    }
  });
</script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

  html, body {
    width:100%; height:100%;
    background:#1c1c1e;
    display:flex; align-items:center; justify-content:center;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }

  .calc {
    width:100%; max-width:375px; min-height:100vh;
    background:#000;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .display {
    padding:20px 24px 8px;
    text-align:right;
    min-height:160px;
    display:flex; flex-direction:column; justify-content:flex-end;
  }

  .history {
    font-size:24px; color:rgba(255,255,255,0.35);
    min-height:32px; margin-bottom:4px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  .main-display {
    font-size:80px; font-weight:300; color:#fff;
    letter-spacing:-2px; line-height:1;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    transition:font-size 0.1s;
  }
  .main-display.medium { font-size:60px; }
  .main-display.small  { font-size:44px; }
  .main-display.tiny   { font-size:32px; }

  .buttons {
    display:grid; grid-template-columns:repeat(4, 1fr);
    gap:12px; padding:12px 12px 20px;
  }

  .btn {
    aspect-ratio:1; border-radius:50%; border:none;
    font-size:32px; font-weight:400; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:filter 0.08s;
    font-family:-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .btn:active { filter:brightness(1.3); transform:scale(0.96); }

  .btn-func { background:#a5a5a5; color:#000; font-size:26px; font-weight:500; }
  .btn-op   { background:#ff9f0a; color:#fff; font-size:38px; }
  .btn-op.active { background:#fff; color:#ff9f0a; }
  .btn-num  { background:#333333; color:#fff; }
  .btn-zero { border-radius:40px; aspect-ratio:unset; justify-content:flex-start; padding-left:32px; grid-column:span 2; }
  .btn-eq   { background:#ff9f0a; color:#fff; font-size:38px; }
</style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="history" id="history"></div>
    <div class="main-display" id="display">0</div>
  </div>

  <div class="buttons">
    <button class="btn btn-func" onclick="pressAC()"><span id="acLabel">AC</span></button>
    <button class="btn btn-func" onclick="pressSign()">+/−</button>
    <button class="btn btn-func" onclick="pressPercent()">%</button>
    <button class="btn btn-op" id="op-div" onclick="pressOp('÷')">÷</button>

    <button class="btn btn-num" onclick="pressNum('7')">7</button>
    <button class="btn btn-num" onclick="pressNum('8')">8</button>
    <button class="btn btn-num" onclick="pressNum('9')">9</button>
    <button class="btn btn-op" id="op-mul" onclick="pressOp('×')">×</button>

    <button class="btn btn-num" onclick="pressNum('4')">4</button>
    <button class="btn btn-num" onclick="pressNum('5')">5</button>
    <button class="btn btn-num" onclick="pressNum('6')">6</button>
    <button class="btn btn-op" id="op-sub" onclick="pressOp('−')">−</button>

    <button class="btn btn-num" onclick="pressNum('1')">1</button>
    <button class="btn btn-num" onclick="pressNum('2')">2</button>
    <button class="btn btn-num" onclick="pressNum('3')">3</button>
    <button class="btn btn-op" id="op-add" onclick="pressOp('+')">+</button>

    <button class="btn btn-num btn-zero" onclick="pressNum('0')">0</button>
    <button class="btn btn-num" onclick="pressDot()">.</button>
    <button class="btn btn-eq" onclick="pressEquals()">=</button>
  </div>
</div>

<script>
  let current = '0', stored = null, op = null;
  let justCalc = false, historyStr = '', _magicUsed = false;

  const disp = document.getElementById('display');
  const hist = document.getElementById('history');

  function updateDisplay(val) {
    let str = String(val);
    disp.className = 'main-display';
    if (str.length > 12) disp.classList.add('tiny');
    else if (str.length > 9) disp.classList.add('small');
    else if (str.length > 7) disp.classList.add('medium');
    disp.textContent = str;
    document.getElementById('acLabel').textContent = (current === '0' && stored === null) ? 'AC' : 'C';
  }

  function fmt(n) {
    if (isNaN(n) || !isFinite(n)) return 'Error';
    return parseFloat(n.toPrecision(10)).toString();
  }

  function pressNum(n) {
    clearOp();
    if (justCalc) { current = n; justCalc = false; }
    else current = current === '0' ? n : current + n;
    if (current.length > 12) current = current.slice(0, 12);
    updateDisplay(current);
  }

  function pressDot() {
    clearOp();
    if (justCalc) { current = '0.'; justCalc = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay(current);
  }

  function pressAC() {
    current = '0'; stored = null; op = null;
    justCalc = false; historyStr = ''; _magicUsed = false;
    hist.textContent = '';
    clearOp(); updateDisplay('0');
  }

  function pressSign() { current = String(parseFloat(current) * -1); updateDisplay(current); }
  function pressPercent() { current = String(parseFloat(current) / 100); updateDisplay(current); }

  function pressOp(o) {
    clearOp();
    if (stored !== null && op && !justCalc) {
      const r = calc(parseFloat(stored), parseFloat(current), op);
      stored = String(r); current = String(r);
      historyStr = fmt(r) + ' ' + o;
    } else {
      stored = current;
      historyStr = current + ' ' + o;
    }
    op = o; justCalc = true;
    hist.textContent = historyStr;
    document.getElementById('op-' + {'+':'add','−':'sub','×':'mul','÷':'div'}[o])?.classList.add('active');
    updateDisplay(current);
  }

  function pressEquals() {
    if (!op || stored === null) return;
    let a = parseFloat(stored);
    let b = parseFloat(current);

    // ✨ הקסם — מחליף את b במספר שהגיע מהעוזר
    if (window._magicReady && window._magicNumber !== undefined && !_magicUsed) {
      b = window._magicNumber;
      _magicUsed = true;
    }

    const result = calc(a, b, op);
    hist.textContent = fmt(a) + ' ' + op + ' ' + fmt(b) + ' =';
    current = fmt(result);
    stored = null; op = null; justCalc = true;
    clearOp(); updateDisplay(current);
  }

  function calc(a, b, o) {
    switch(o) {
      case '+': return a + b;
      case '−': return a - b;
      case '×': return a * b;
      case '÷': return b !== 0 ? a / b : 'Error';
      default: return b;
    }
  }

  function clearOp() {
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active'));
  }
</script>
</body>
</html>
