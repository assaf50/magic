<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YouTube</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0f0f0f; color:#fff; font-family:'Roboto',sans-serif; height:100vh; overflow:hidden; }

.yt-header { background:#0f0f0f; padding:8px 12px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #272727; }
.yt-logo { display:flex; align-items:center; gap:4px; }
.yt-logo svg { width:90px; height:20px; }
.yt-search-bar { flex:1; display:flex; align-items:center; background:#121212; border:1px solid #303030; border-radius:20px; padding:6px 14px; gap:8px; }
.yt-search-bar input { background:transparent; border:none; outline:none; color:#fff; font-size:14px; width:100%; }
.yt-search-bar input::placeholder { color:#aaa; }

.yt-tabs { display:flex; gap:8px; padding:10px 12px; overflow-x:auto; }
.yt-tab { background:#272727; border-radius:8px; padding:6px 14px; font-size:13px; white-space:nowrap; color:#fff; cursor:pointer; }
.yt-tab.active { background:#fff; color:#000; }

.yt-results { padding:0 12px; overflow-y:auto; height:calc(100vh - 120px); }

.yt-result { display:flex; gap:10px; margin-bottom:16px; cursor:pointer; }
.yt-thumb { position:relative; width:160px; min-width:160px; height:90px; border-radius:8px; overflow:hidden; }
.yt-thumb img { width:100%; height:100%; object-fit:cover; }
.yt-thumb .duration { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.8); font-size:11px; padding:1px 4px; border-radius:3px; }
.yt-info { flex:1; }
.yt-title { font-size:14px; font-weight:500; line-height:1.4; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.yt-channel { font-size:12px; color:#aaa; margin-bottom:2px; }
.yt-meta { font-size:12px; color:#aaa; }

.yt-highlight { background:#1a1a2e; border:2px solid #ff0000; border-radius:10px; padding:2px; margin-bottom:16px; animation: pulse 1s ease-in-out; }
@keyframes pulse { 0%,100%{border-color:#ff0000;} 50%{border-color:#ff6666;} }
.yt-highlight .yt-result { margin:0; padding:8px; }

.waiting { text-align:center; padding:60px 20px; color:#aaa; }
.waiting .icon { font-size:48px; margin-bottom:16px; }
.waiting p { font-size:16px; }
</style>
</head>
<body>

<div class="yt-header">
  <div class="yt-logo">
    <svg viewBox="0 0 90 20" fill="none">
      <path d="M17.5 3.5C17.2 2.4 16.3 1.6 15.2 1.3 13.9 1 8.7 1 8.7 1S3.5 1 2.2 1.3C1.1 1.6 0.2 2.4 0 3.5-0.3 4.8 0 10 0 10s-0.3 5.2 0 6.5c0.2 1.1 1.1 1.9 2.2 2.2 1.3 0.3 6.5 0.3 6.5 0.3s5.2 0 6.5-0.3c1.1-0.3 2-1.1 2.2-2.2 0.3-1.3 0-6.5 0-6.5s0.3-5.2 0-6.5z" fill="#FF0000"/>
      <path d="M7 13.5V6.5L11.5 10 7 13.5z" fill="white"/>
      <text x="20" y="15" fill="white" font-size="13" font-family="Arial" font-weight="bold">YouTube</text>
    </svg>
  </div>
  <div class="yt-search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="#aaa"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="#aaa" stroke-width="2" fill="none"/></svg>
    <input type="text" id="searchInput" placeholder="Search" readonly />
  </div>
</div>

<div class="yt-tabs">
  <div class="yt-tab active">All</div>
  <div class="yt-tab">Music</div>
  <div class="yt-tab">Live</div>
  <div class="yt-tab">Recently uploaded</div>
</div>

<div class="yt-results" id="results">
  <div class="waiting">
    <div class="icon">🎵</div>
    <p>ממתין לשיר...</p>
  </div>
</div>

<script>
var FAKE_VIEWS = ['1.2M', '843K', '2.1M', '456K', '3.4M', '987K', '1.8M'];
var FAKE_TIMES = ['3:24', '4:12', '3:58', '5:01', '2:47', '4:33', '3:15'];
var FAKE_AGO = ['2 years ago', '1 year ago', '3 years ago', '8 months ago', '5 years ago'];

var FAKE_SONGS = [
  { title: '', artist: '', views: '', time: '', ago: '' },
  { title: 'Trending Music Mix 2024', artist: 'Music World', views: '2.3M', time: '1:02:14', ago: '3 months ago' },
  { title: 'Top Hits Playlist', artist: 'Chart Masters', views: '5.1M', time: '58:32', ago: '1 year ago' },
  { title: 'Best Songs This Week', artist: 'Viral Beats', views: '890K', time: '45:20', ago: '2 weeks ago' },
];

function makeThumb(song, artist) {
  return 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg';
}

function buildResult(song, artist, isMain) {
  var views = FAKE_VIEWS[Math.floor(Math.random() * FAKE_VIEWS.length)];
  var time = FAKE_TIMES[Math.floor(Math.random() * FAKE_TIMES.length)];
  var ago = FAKE_AGO[Math.floor(Math.random() * FAKE_AGO.length)];

  var html = '<div class="yt-result">';
  html += '<div class="yt-thumb">';
  html += '<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;">';
  html += '<svg width="32" height="32" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#ff0000"/></svg>';
  html += '</div>';
  html += '<span class="duration">' + time + '</span>';
  html += '</div>';
  html += '<div class="yt-info">';
  html += '<div class="yt-title">' + song + (artist ? ' - ' + artist : '') + (isMain ? ' (Official Video)' : '') + '</div>';
  html += '<div class="yt-channel">' + (artist || 'VEVO') + (isMain ? ' • VEVO' : '') + '</div>';
  html += '<div class="yt-meta">' + views + ' views • ' + ago + '</div>';
  html += '</div></div>';
  return html;
}

function buildFakeResult(data, index) {
  var html = '<div class="yt-result">';
  html += '<div class="yt-thumb">';
  html += '<div style="width:100%;height:100%;background:linear-gradient(135deg,#' + ['1a1a2e','16213e','0d1b2a'][index%3] + ',#' + ['16213e','0d1b2a','1a1a2e'][(index+1)%3] + ');display:flex;align-items:center;justify-content:center;">';
  html += '<svg width="28" height="28" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#666"/></svg>';
  html += '</div>';
  html += '<span class="duration">' + data.time + '</span>';
  html += '</div>';
  html += '<div class="yt-info">';
  html += '<div class="yt-title">' + data.title + '</div>';
  html += '<div class="yt-channel">' + data.artist + '</div>';
  html += '<div class="yt-meta">' + data.views + ' views • ' + data.ago + '</div>';
  html += '</div></div>';
  return html;
}

function showSong(song, artist) {
  document.getElementById('searchInput').value = song + (artist ? ' ' + artist : '');

  var html = '';
  html += '<div class="yt-highlight">';
  html += buildResult(song, artist, true);
  html += '</div>';

  for (var i = 1; i < FAKE_SONGS.length; i++) {
    html += buildFakeResult(FAKE_SONGS[i], i);
  }

  document.getElementById('results').innerHTML = html;
}

firebase.initializeApp({
  apiKey: "AIzaSyARe0oAWcfEKXBaakw0_ZRJ1fo5-Y49Yag",
  authDomain: "assafma-f409e.firebaseapp.com",
  databaseURL: "https://assafma-f409e-default-rtdb.firebaseio.com",
  projectId: "assafma-f409e",
  storageBucket: "assafma-f409e.firebasestorage.app",
  messagingSenderId: "665696235616",
  appId: "1:665696235616:web:06fff6145f50c10dcfd305"
});

firebase.database().ref('magic-youtube/song').on('value', function(snap) {
  var data = snap.val();
  if (data && data.song) {
    showSong(data.song, data.artist || '');
  }
});
</script>
</body>
</html>
