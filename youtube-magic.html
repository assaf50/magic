<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YouTube</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0f0f0f; color:#fff; font-family:'Roboto',Arial,sans-serif; height:100vh; overflow:hidden; }

/* SEARCH SCREEN */
#searchScreen { height:100vh; display:flex; flex-direction:column; }
.yt-header { background:#0f0f0f; padding:8px 12px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #272727; flex-shrink:0; }
.yt-logo-text { font-size:18px; font-weight:bold; color:#fff; letter-spacing:-0.5px; }
.yt-logo-text span { color:#ff0000; }
.yt-search-bar { flex:1; display:flex; align-items:center; background:#121212; border:1px solid #303030; border-radius:20px; padding:6px 14px; gap:8px; }
.yt-search-bar span { color:#aaa; font-size:14px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.yt-tabs { display:flex; gap:8px; padding:10px 12px; overflow-x:auto; flex-shrink:0; }
.yt-tab { background:#272727; border-radius:8px; padding:6px 14px; font-size:13px; white-space:nowrap; color:#fff; }
.yt-tab.active { background:#fff; color:#000; }
.yt-results { flex:1; overflow-y:auto; padding:0 12px 20px; }
.yt-result { display:flex; gap:10px; margin-bottom:16px; cursor:pointer; }
.yt-thumb { position:relative; width:160px; min-width:160px; height:90px; border-radius:8px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.yt-thumb .duration { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.85); font-size:11px; padding:1px 5px; border-radius:3px; }
.yt-info { flex:1; }
.yt-title { font-size:14px; font-weight:500; line-height:1.4; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.yt-channel { font-size:12px; color:#aaa; margin-bottom:2px; }
.yt-meta { font-size:12px; color:#aaa; }
.yt-highlight { border:2px solid #ff0000; border-radius:10px; padding:8px; margin-bottom:16px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{border-color:#ff0000;} 50%{border-color:#ff6666;} }

/* PLAYER SCREEN */
#playerScreen { display:none; height:100vh; flex-direction:column; background:#0f0f0f; }
.player-header { display:flex; align-items:center; gap:12px; padding:10px 14px; flex-shrink:0; }
.back-btn { font-size:22px; cursor:pointer; color:#fff; }
.player-header-title { font-size:14px; font-weight:500; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.video-area { width:100%; aspect-ratio:16/9; background:#000; position:relative; flex-shrink:0; cursor:pointer; }
.video-bg { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a0a0a,#0d0d0d); }
.video-bg .play-icon { opacity:0; }
.video-overlay { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center; }
.big-play { width:60px; height:60px; background:rgba(0,0,0,0.7); border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; }
.big-play.show { opacity:1; }
.video-area:active .big-play { opacity:1; }

/* fake waveform */
.waveform { display:flex; align-items:center; gap:2px; height:40px; padding:0 8px; }
.waveform-bar { background:#ff4444; border-radius:2px; animation:wave 0.8s ease-in-out infinite alternate; }
@keyframes wave { from{transform:scaleY(0.4);} to{transform:scaleY(1);} }

.player-info { padding:14px 16px 10px; flex-shrink:0; }
.player-title { font-size:18px; font-weight:600; margin-bottom:4px; line-height:1.3; }
.player-artist { font-size:14px; color:#aaa; }

.progress-area { padding:0 16px; flex-shrink:0; }
.progress-bar-bg { height:3px; background:#303030; border-radius:2px; position:relative; cursor:pointer; }
.progress-bar-fill { height:100%; background:#ff0000; border-radius:2px; transition:width 0.5s linear; }
.progress-dot { position:absolute; top:50%; right:-5px; width:12px; height:12px; background:#ff0000; border-radius:50%; transform:translateY(-50%); }
.time-row { display:flex; justify-content:space-between; margin-top:6px; font-size:12px; color:#aaa; }

.player-controls { display:flex; align-items:center; justify-content:space-around; padding:12px 16px; flex-shrink:0; }
.ctrl-btn { background:none; border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.ctrl-btn.main { width:56px; height:56px; background:#fff; border-radius:50%; }
.ctrl-btn.main svg { color:#000; }

.player-extra { padding:0 16px; flex-shrink:0; }
.like-row { display:flex; gap:8px; margin-bottom:12px; }
.like-btn { display:flex; align-items:center; gap:6px; background:#272727; border-radius:20px; padding:7px 14px; font-size:13px; cursor:pointer; }
.subscribe-btn { background:#ff0000; border-radius:20px; padding:8px 16px; font-size:14px; font-weight:600; margin-bottom:12px; display:inline-block; cursor:pointer; }

.waiting { text-align:center; padding:60px 20px; color:#aaa; }
</style>
</head>
<body>

<!-- SEARCH SCREEN -->
<div id="searchScreen">
  <div class="yt-header">
    <div class="yt-logo-text">You<span>Tube</span></div>
    <div class="yt-search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span id="searchText">Search</span>
    </div>
  </div>
  <div class="yt-tabs">
    <div class="yt-tab active">All</div>
    <div class="yt-tab">Music</div>
    <div class="yt-tab">Live</div>
    <div class="yt-tab">Recently uploaded</div>
  </div>
  <div class="yt-results" id="results">
    <div class="waiting">
      <div style="font-size:48px;margin-bottom:16px;">🎵</div>
      <p>Waiting for a song...</p>
    </div>
  </div>
</div>

<!-- PLAYER SCREEN -->
<div id="playerScreen" style="display:none;flex-direction:column;">
  <div class="player-header">
    <div class="back-btn" onclick="goBack()">&#8249;</div>
    <div class="player-header-title" id="playerHeaderTitle">Now Playing</div>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
  </div>

  <div class="video-area" id="videoArea" onclick="togglePlay()">
    <div class="video-bg">
      <div class="waveform" id="waveform"></div>
    </div>
    <div class="video-overlay">
      <div class="big-play" id="bigPlay">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>
  </div>

  <div class="player-info">
    <div class="player-title" id="playerTitle">Song Title</div>
    <div class="player-artist" id="playerArtist">Artist Name • 2024</div>
  </div>

  <div class="progress-area">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:34%;">
        <div class="progress-dot"></div>
      </div>
    </div>
    <div class="time-row">
      <span id="currentTime">1:14</span>
      <span id="totalTime">3:42</span>
    </div>
  </div>

  <div class="player-controls">
    <div class="ctrl-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M17 1l-10 11 10 11V1z"/><path d="M7 1v22H5V1h2z"/></svg>
    </div>
    <div class="ctrl-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.31"/></svg>
    </div>
    <div class="ctrl-btn main" id="playPauseBtn" onclick="togglePlay()">
      <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="#000" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      <svg id="pauseIcon" width="24" height="24" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <div class="ctrl-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </div>
    <div class="ctrl-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M7 23l10-11L7 1v22z"/><path d="M17 1v22h2V1h-2z"/></svg>
    </div>
  </div>

  <div class="player-extra">
    <div class="like-row">
      <div class="like-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
        245K
      </div>
      <div class="like-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>
        Dislike
      </div>
      <div class="like-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </div>
      <div class="like-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Save
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;background:#111;border-radius:12px;padding:10px 14px;">
      <div style="width:36px;height:36px;background:#ff0000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;" id="artistAvatar">V</div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:600;" id="artistName2">VEVO</div>
        <div style="font-size:12px;color:#aaa;">12.4M subscribers</div>
      </div>
      <div class="subscribe-btn">Subscribe</div>
    </div>
  </div>
</div>

<script>
var currentSong = '', currentArtist = '';
var isPlaying = true;
var progressPct = 34;
var totalSecs = 222;
var currentSecs = Math.floor(totalSecs * progressPct / 100);
var timer = null;

function fmt(s) {
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

function buildWaveform() {
  var wf = document.getElementById('waveform');
  wf.innerHTML = '';
  for (var i = 0; i < 40; i++) {
    var h = 8 + Math.random() * 28;
    var bar = document.createElement('div');
    bar.className = 'waveform-bar';
    bar.style.cssText = 'width:4px;height:'+h+'px;animation-delay:'+(Math.random()*0.8)+'s;animation-duration:'+(0.4+Math.random()*0.6)+'s;';
    wf.appendChild(bar);
  }
}

var FAKE_RESULTS = [
  { title: 'Top Hits 2024 Mix', artist: 'Music World', views: '2.3M', time: '1:02:14', ago: '3 months ago' },
  { title: 'Best Songs Playlist', artist: 'Chart Masters', views: '5.1M', time: '58:32', ago: '1 year ago' },
  { title: 'Viral Hits This Week', artist: 'Viral Beats', views: '890K', time: '45:20', ago: '2 weeks ago' },
];

function openPlayer(song, artist) {
  currentSong = song; currentArtist = artist;
  document.getElementById('playerTitle').textContent = song;
  document.getElementById('playerArtist').textContent = (artist || 'Unknown Artist') + ' • Official Video';
  document.getElementById('playerHeaderTitle').textContent = song;
  document.getElementById('artistName2').textContent = artist || 'VEVO';
  document.getElementById('artistAvatar').textContent = (artist || 'V').charAt(0).toUpperCase();

  var randomTotal = 180 + Math.floor(Math.random() * 120);
  totalSecs = randomTotal;
  currentSecs = Math.floor(randomTotal * (0.25 + Math.random()*0.2));
  progressPct = Math.round(currentSecs / totalSecs * 100);

  document.getElementById('totalTime').textContent = fmt(totalSecs);
  document.getElementById('currentTime').textContent = fmt(currentSecs);
  document.getElementById('progressFill').style.width = progressPct + '%';

  buildWaveform();
  isPlaying = true;
  document.getElementById('playIcon').style.display = 'block';
  document.getElementById('pauseIcon').style.display = 'none';
  startTimer();

  document.getElementById('searchScreen').style.display = 'none';
  document.getElementById('playerScreen').style.display = 'flex';
}

function goBack() {
  clearInterval(timer);
  document.getElementById('playerScreen').style.display = 'none';
  document.getElementById('searchScreen').style.display = 'flex';
}

function togglePlay() {
  isPlaying = !isPlaying;
  if (isPlaying) {
    document.getElementById('playIcon').style.display = 'block';
    document.getElementById('pauseIcon').style.display = 'none';
    document.getElementById('bigPlay').classList.remove('show');
    startTimer();
    document.querySelectorAll('.waveform-bar').forEach(function(b){ b.style.animationPlayState='running'; });
  } else {
    document.getElementById('playIcon').style.display = 'none';
    document.getElementById('pauseIcon').style.display = 'block';
    document.getElementById('bigPlay').classList.add('show');
    clearInterval(timer);
    document.querySelectorAll('.waveform-bar').forEach(function(b){ b.style.animationPlayState='paused'; });
  }
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(function() {
    if (currentSecs < totalSecs) {
      currentSecs++;
      progressPct = Math.round(currentSecs / totalSecs * 100);
      document.getElementById('currentTime').textContent = fmt(currentSecs);
      document.getElementById('progressFill').style.width = progressPct + '%';
    } else {
      clearInterval(timer);
    }
  }, 1000);
}

function showResults(song, artist) {
  document.getElementById('searchText').textContent = song + (artist ? ' ' + artist : '');
  var html = '<div class="yt-highlight" onclick="openPlayer(\'' + song.replace(/'/g,"\\'") + '\',\'' + (artist||'').replace(/'/g,"\\'") + '\')">';
  html += '<div class="yt-result">';
  html += '<div class="yt-thumb" style="background:linear-gradient(135deg,#1a0505,#2a0a0a);">';
  html += '<svg width="32" height="32" viewBox="0 0 24 24" fill="#ff0000"><path d="M8 5v14l11-7z"/></svg>';
  html += '<span class="duration">' + fmt(180+Math.floor(Math.random()*120)) + '</span></div>';
  html += '<div class="yt-info"><div class="yt-title">' + song + (artist?' - '+artist:'') + ' (Official Video)</div>';
  html += '<div class="yt-channel">' + (artist||'VEVO') + ' • VEVO</div>';
  html += '<div class="yt-meta">' + (1+Math.floor(Math.random()*9)) + '.' + Math.floor(Math.random()*9) + 'M views • ' + (1+Math.floor(Math.random()*3)) + ' years ago</div>';
  html += '</div></div></div>';

  FAKE_RESULTS.forEach(function(r) {
    html += '<div class="yt-result">';
    html += '<div class="yt-thumb" style="background:linear-gradient(135deg,#111,#1a1a1a);">';
    html += '<svg width="26" height="26" viewBox="0 0 24 24" fill="#555"><path d="M8 5v14l11-7z"/></svg>';
    html += '<span class="duration">'+r.time+'</span></div>';
    html += '<div class="yt-info"><div class="yt-title">'+r.title+'</div>';
    html += '<div class="yt-channel">'+r.artist+'</div>';
    html += '<div class="yt-meta">'+r.views+' views • '+r.ago+'</div>';
    html += '</div></div>';
  });

  document.getElementById('results').innerHTML = html;
}

firebase.initializeApp({
  apiKey: "AIzaSyARe0oAWcfEKXBaakw0_ZRJ1fo5-Y49Yag",
  authDomain: "assafma-f409e.firebaseapp.com",
  databaseURL: "https://assafma-f409e-default-rtdb.firebaseio.com",
  projectId: "assafma-f409e",
  storageBucket: "assafma-f409e.firebasestorage.app",
  messagingSenderId: "665696235616",
  appId: "1:665696235616:web:06fff6145f50c10dcfd305"
});

firebase.database().ref('magic-youtube/song').on('value', function(snap) {
  var data = snap.val();
  if (data && data.song) {
    showResults(data.song, data.artist || '');
  }
});
</script>
</body>
</html>
