<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculator</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html, body { width:100%; height:100%; background:#000; font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif; overflow:hidden; }
.ios-shell { width:100%; max-width:430px; height:100vh; margin:0 auto; background:#000; display:flex; flex-direction:column; }
.status-bar { display:flex; justify-content:space-between; align-items:center; padding:14px 24px 0; height:50px; flex-shrink:0; }
.status-time { font-size:17px; font-weight:600; color:#fff; }
.status-icons { display:flex; align-items:center; gap:7px; }
.status-icons svg { fill:#fff; }
.top-bar { display:flex; justify-content:space-between; align-items:center; padding:8px 20px 4px; flex-shrink:0; }
.top-icon { width:36px; height:36px; background:rgba(255,255,255,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; }
.display { flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:0 24px 12px; min-height:0; }
.history { font-size:22px; color:rgba(255,255,255,0.4); text-align:right; min-height:30px; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.main-display { font-size:88px; font-weight:200; color:#fff; text-align:right; letter-spacing:-3px; line-height:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.main-display.s6 { font-size:72px; } .main-display.s7 { font-size:60px; } .main-display.s9 { font-size:48px; } .main-display.s12 { font-size:36px; }
.buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:13px; padding:13px 13px 34px; flex-shrink:0; }
.btn { border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:inherit; aspect-ratio:1; font-size:34px; font-weight:400; }
.btn:active { filter:brightness(1.4); transform:scale(0.94); }
.btn-func { background:#a5a5a5; color:#1c1c1e; font-size:22px; font-weight:500; }
.btn-op { background:#ff9f0a; color:#fff; font-size:42px; font-weight:300; }
.btn-op.active { background:#fff; color:#ff9f0a; }
.btn-num { background:#333; color:#fff; }
.btn-zero { grid-column:span 2; border-radius:50px; aspect-ratio:unset; justify-content:flex-start; padding-left:30px; }
</style>
</head>
<body>
<div class="ios-shell">
  <div class="status-bar">
    <div class="status-time" id="clockTime">00:00</div>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="0.8" opacity="0.4"/><rect x="4.5" y="5" width="3" height="7" rx="0.8" opacity="0.6"/><rect x="9" y="3" width="3" height="9" rx="0.8" opacity="0.8"/><rect x="13.5" y="0" width="3" height="12" rx="0.8"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/><path d="M8 6.5C6.1 6.5 4.4 7.3 3.2 8.5L4.6 10c.9-.9 2.1-1.5 3.4-1.5s2.5.6 3.4 1.5l1.4-1.5C11.6 7.3 9.9 6.5 8 6.5z" opacity="0.75"/><path d="M8 3.5C5.1 3.5 2.5 4.7.7 6.7L2.1 8.1C3.6 6.4 5.7 5.5 8 5.5s4.4.9 5.9 2.6l1.4-1.4C13.5 4.7 10.9 3.5 8 3.5z" opacity="0.5"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0" y="1" width="23" height="11" rx="3.5" stroke="#fff" stroke-width="1.2" fill="none"/><rect x="1.5" y="2.5" width="10" height="8" rx="2" fill="#fff"/><path d="M24.5 4.5v4a2 2 0 0 0 0-4z" fill="#fff" opacity="0.4"/></svg>
    </div>
  </div>
  <div class="top-bar">
    <div class="top-icon">⌗</div>
    <div class="top-icon">🕐</div>
  </div>
  <div class="display">
    <div class="history" id="history"></div>
    <div class="main-display" id="mainDisplay">0</div>
  </div>
  <div class="buttons">
    <button class="btn btn-func" id="acBtn">AC</button>
    <button class="btn btn-func" id="signBtn">+/−</button>
    <button class="btn btn-func" id="pctBtn">%</button>
    <button class="btn btn-op" id="divBtn">÷</button>
    <button class="btn btn-num" data-n="7">7</button>
    <button class="btn btn-num" data-n="8">8</button>
    <button class="btn btn-num" data-n="9">9</button>
    <button class="btn btn-op" id="mulBtn">×</button>
    <button class="btn btn-num" data-n="4">4</button>
    <button class="btn btn-num" data-n="5">5</button>
    <button class="btn btn-num" data-n="6">6</button>
    <button class="btn btn-op" id="subBtn">−</button>
    <button class="btn btn-num" data-n="1">1</button>
    <button class="btn btn-num" data-n="2">2</button>
    <button class="btn btn-num" data-n="3">3</button>
    <button class="btn btn-op" id="addBtn">+</button>
    <button class="btn btn-num btn-zero" data-n="0">0</button>
    <button class="btn btn-num" id="dotBtn">.</button>
    <button class="btn btn-op" id="eqBtn">=</button>
  </div>
</div>

<script>
var current = '0', stored = null, op = null, justCalc = false, magicNum = null, magicUsed = false;
var dispEl = document.getElementById('mainDisplay');
var histEl = document.getElementById('history');
var acBtn = document.getElementById('acBtn');

function updateClock() {
  var now = new Date();
  document.getElementById('clockTime').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 10000);

function setDisplay(val) {
  var s = String(val);
  dispEl.className = 'main-display';
  if (s.length > 12) dispEl.classList.add('s12');
  else if (s.length > 9) dispEl.classList.add('s9');
  else if (s.length > 7) dispEl.classList.add('s7');
  else if (s.length > 6) dispEl.classList.add('s6');
  dispEl.textContent = s;
  acBtn.textContent = (current === '0' && stored === null) ? 'AC' : 'C';
}

function fmt(n) {
  if (isNaN(n) || !isFinite(n)) return 'Error';
  return parseFloat(n.toPrecision(10)).toString();
}

function clearOps() {
  document.querySelectorAll('.btn-op').forEach(function(b) { b.classList.remove('active'); });
}

function doCalc(a, b, o) {
  if (o === '+') return a + b;
  if (o === '−') return a - b;
  if (o === '×') return a * b;
  if (o === '÷') return b !== 0 ? a / b : 'Error';
  return b;
}

document.querySelectorAll('.btn-num').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var n = this.dataset.n;
    clearOps();
    if (justCalc) { current = n; justCalc = false; }
    else current = current === '0' ? n : current + n;
    if (current.length > 12) current = current.slice(0, 12);
    setDisplay(current);
  });
});

document.getElementById('dotBtn').addEventListener('click', function() {
  clearOps();
  if (justCalc) { current = '0.'; justCalc = false; }
  else if (!current.includes('.')) current += '.';
  setDisplay(current);
});

acBtn.addEventListener('click', function() {
  current = '0'; stored = null; op = null; justCalc = false; magicUsed = false;
  histEl.textContent = ''; clearOps(); setDisplay('0');
});

document.getElementById('signBtn').addEventListener('click', function() {
  current = String(parseFloat(current) * -1); setDisplay(current);
});

document.getElementById('pctBtn').addEventListener('click', function() {
  current = String(parseFloat(current) / 100); setDisplay(current);
});

var opMap = { divBtn:'÷', mulBtn:'×', subBtn:'−', addBtn:'+' };
Object.keys(opMap).forEach(function(id) {
  document.getElementById(id).addEventListener('click', function() {
    var o = opMap[id];
    clearOps();
    if (stored !== null && op && !justCalc) {
      var r = doCalc(parseFloat(stored), parseFloat(current), op);
      stored = String(r); current = String(r);
      histEl.textContent = fmt(r) + ' ' + o;
    } else {
      stored = current; histEl.textContent = current + ' ' + o;
    }
    op = o; justCalc = true;
    this.classList.add('active');
    setDisplay(current);
  });
});

document.getElementById('eqBtn').addEventListener('click', function() {
  if (!op || stored === null) return;
  var a = parseFloat(stored), b = parseFloat(current);
  if (magicNum !== null && !magicUsed) { b = magicNum; magicUsed = true; }
  var result = doCalc(a, b, op);
  histEl.textContent = fmt(a) + ' ' + op + ' ' + fmt(b) + ' =';
  current = fmt(result); stored = null; op = null; justCalc = true;
  clearOps(); setDisplay(current);
});

firebase.initializeApp({
  apiKey: "AIzaSyARe0oAWcfEKXBaakw0_ZRJ1fo5-Y49Yag",
  authDomain: "assafma-f409e.firebaseapp.com",
  databaseURL: "https://assafma-f409e-default-rtdb.firebaseio.com",
  projectId: "assafma-f409e",
  storageBucket: "assafma-f409e.firebasestorage.app",
  messagingSenderId: "665696235616",
  appId: "1:665696235616:web:06fff6145f50c10dcfd305"
});

firebase.database().ref('magic-dudu/myNumber').on('value', function(snap) {
  var data = snap.val();
  if (data && data.value !== undefined) {
    magicNum = data.value;
    magicUsed = false;
    current = String(data.value);
    stored = null; op = null; justCalc = false;
    clearOps();
    setDisplay(current);
  }
});
</script>
</body>
</html>
